# =============================================================================
# FinRAG Docker Compose — Production-grade
# Services: PostgreSQL 16 + pgvector, Redis 7, FinRAG API
# =============================================================================

version: "3.9"

x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}

services:

  # ── PostgreSQL 16 + pgvector ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finrag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-finrag}
      POSTGRES_INITDB_ARGS: "--data-checksums --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"     # Bind to loopback only in production
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c maintenance_work_mem=256MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=8MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c max_worker_processes=8
        -c max_parallel_workers_per_gather=4
        -c max_parallel_workers=8
        -c max_parallel_maintenance_workers=4
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=off
        -c log_disconnections=off
        -c log_lock_waits=on
        -c log_temp_files=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finrag} -d ${POSTGRES_DB:-finrag}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - finrag_internal

  # ── Redis 7 (rate limiting, caching, token blacklist) ────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: finrag_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --appendonly yes
        --appendfsync everysec
        --no-appendfsync-on-rewrite no
        --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - finrag_internal

  # ── FinRAG API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: finrag_api
    restart: unless-stopped
    environment:
      <<: *common-env
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-text-embedding-3-small}
      LLM_TEMPERATURE: "0.0"
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_PATH: /data/uploads
    volumes:
      - upload_data:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - finrag_internal
      - finrag_external
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Database migration runner (init job) ─────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: finrag_migrate
    environment:
      <<: *common-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finrag_internal
    restart: on-failure

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local

networks:
  finrag_internal:
    driver: bridge
    internal: true          # No direct internet access for DB/Redis
  finrag_external:
    driver: bridge          # API can reach OpenAI
